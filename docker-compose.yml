services:
  db:
    image: postgres:15-alpine
    container_name: ramassage_db
    restart: always
    environment:
      POSTGRES_DB: db_ramassage
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432" 
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
